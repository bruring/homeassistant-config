#################################################################
## Turn on lights based on sunlight percentage
#################################################################

  - alias: Set dark outside on
    trigger:
      platform: numeric_state
      entity_id: sensor.sunlight_pct
      below: 32
      for:
        minutes: 4
    action:
      - service: input_boolean.turn_on
        entity_id: input_boolean.dark_outside

  - alias: Set dark outside off
    trigger:
      platform: numeric_state
      entity_id: sensor.sunlight_pct
      above: 32
      for:
        minutes: 4
    action:
      - service: input_boolean.turn_off
        entity_id: input_boolean.dark_outside

  - alias: Set dark inside on
    trigger:
      platform: numeric_state
      entity_id: sensor.average_light_level
      below: 100
      for:
        minutes: 4
    action:
      - service: input_boolean.turn_on
        entity_id: input_boolean.dark_inside

  - alias: Set dark inside off
    trigger:
      platform: numeric_state
      entity_id: sensor.average_light_level
      above: 100
      for:
        minutes: 4
    action:
      - service: input_boolean.turn_off
        entity_id: input_boolean.dark_inside

  - alias: Enable evening mode - dark outside 1,5 hrs before sunset
    trigger:
      platform: sun
      event: sunset
      offset: "-01:00:00"
    action:
      - service: input_boolean.turn_on
        entity_id: input_boolean.evening_mode

  - alias: Disable evening mode - it's getting light
    trigger:
      platform: sun
      event: sunrise
    action:
      - service: input_boolean.turn_off
        entity_id: input_boolean.evening_mode

  - alias: Turn on lights when it's dark outside
    trigger:
      platform: state
      entity_id: input_boolean.dark_outside
      to: 'on'
    condition:
      - condition: state
        entity_id: input_select.house_mode
        state: 'home'
      - condition: time
        before: '23:00:00'
        after: '10:00:00'
    action:
      - service: light.turn_on
        entity_id:
          - light.living_lights
          - light.office_lights
          - light.kitchen_lights
          - light.salon_lights
          - light.wardrobe_lights
          - light.garden_lights

  - alias: Turn off lights when it's light outside and evening mode is off
    trigger:
      platform: state
      entity_id: input_boolean.dark_outside
      to: 'off'
    condition:
      - condition: state
        entity_id: input_select.house_mode
        state: 'home'
      - condition: state
        entity_id: input_boolean.evening_mode
        state: 'off'
    action:
      - service: light.turn_off
        entity_id:
          - light.living_lights
          - light.office_lights
          - light.kitchen_lights
          - light.salon_lights
          - light.wardrobe_lights
          - light.garden_lights